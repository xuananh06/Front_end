<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Dang Ky</title>
</head>
<body>

    <h1><b>Đăng ký Thành Viên</b></h1>
    
    <style>
        table,
        th,
        td {
            border: 1px solid #ddd
        }

        th,
        td {
            padding: 10px
        }
    </style>

    <form action="https://www.w3schools.com/action_page.php" target="_blank" method="POST" >
    <table>

        <tbody>
            <tr>
                <td>Name</td>
                <td>
                    <input type="text" name="name" placeholder="Your Name" required>
                </td>
            
            </tr>

            <tr>
                <td>Sex</td>
                <td>
                    <input type="Checkbox" name="sex" id="male" value="m" >
                    <label for="male">Male</label>
                    
                    <input type="Checkbox" name="sex" id="female" value="fm" >
                    <label for="female">Female</label>

                    <input type="Checkbox" name="sex" id="other" value="other" >
                    <label for="other">Other</label>


                </td>
            </tr>

            <tr>  
                <td>Password</td> 
                <td>
                    <input type="password" name="pass" placeholder="Your Password" required>
                </td>           
            </tr>

            <tr>  
                <td>Hobby</td>            
            </tr>

            <tr>            
                <td>Age</td>  
            </tr>

            <tr>     
                <td>Keyword</td>         
            </tr>

            <tr>  
                <td>Information:</td>            
            </tr>

            <tr>     
                <td>Link web</td>         
            </tr>

            <tr>    
                <td>Email</td>          
            </tr>

            <tr>              
                <td>Phone number</td>
            </tr>

            <tr>              
            </tr>


        </tbody>
    </table>

    <button> Gửi</button>
    </form>

</body>
</html>
